<div class="progress-bar-root" [attr.aria-label]="ariaLabel()" role="status">
  <!-- Top row -->
  <div class="progress-bar-header">
    <div class="progress-bar-status">
      <span class="progress-bar-pulse" aria-hidden="true"></span>
      <span class="progress-bar-label">{{ label() }}</span>
    </div>
    <span class="progress-bar-count" aria-hidden="true">
      <strong>{{ current() }}</strong> / {{ total() }}
    </span>
  </div>

  <!-- Track -->
  <div class="progress-bar-track" aria-hidden="true">
    <div class="progress-bar-fill" [style.width.%]="percentage()">
      <div class="progress-bar-shine"></div>
    </div>
  </div>

  <!-- Bottom row -->
  <div class="progress-bar-footer">
    @if (currentFileName()) {
    <span class="progress-bar-file" aria-live="polite" aria-atomic="true">
      <svg aria-hidden="true" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2" />
        <circle cx="8.5" cy="8.5" r="1.5" />
        <polyline points="21 15 16 10 5 21" />
      </svg>
      {{ currentFileName() }}
    </span>
    }
    <span class="progress-bar-percentage" aria-hidden="true">{{ percentage() }}%</span>
  </div>
</div>
