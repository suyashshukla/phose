<!--
  OG Image — 1200×630
  For production: open in Chrome, screenshot or use a headless renderer to export as PNG.
  Twitter/Facebook prefer PNG for og:image; SVG works in many but not all contexts.
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="orb-tl" cx="14%" cy="16%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-br" cx="88%" cy="86%" r="48%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.035)"/>
    </pattern>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="630" fill="#07070f"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#orb-tl)"/>
  <rect width="1200" height="630" fill="url(#orb-br)"/>

  <!-- ── Logo icon (240×240, centered in left zone) ── -->
  <g transform="translate(75, 195) scale(0.46875)">
    <rect width="512" height="512" rx="108" fill="#0d0d20"/>
    <rect width="512" height="512" rx="108" fill="url(#brand)" opacity="0.08"/>

    <!-- Corner brackets -->
    <path d="M122 196 L122 146 L172 146" stroke="url(#brand)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M340 146 L390 146 L390 196" stroke="url(#brand)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M122 316 L122 366 L172 366" stroke="url(#brand)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M390 316 L390 366 L340 366" stroke="url(#brand)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Head -->
    <ellipse cx="256" cy="248" rx="88" ry="100" stroke="#818cf8" stroke-width="5" fill="none" opacity="0.72"/>

    <!-- Eyes -->
    <circle cx="220" cy="224" r="15" fill="#6366f1"/>
    <circle cx="226" cy="219" r="5.5" fill="white" opacity="0.42"/>
    <circle cx="292" cy="224" r="15" fill="#6366f1"/>
    <circle cx="298" cy="219" r="5.5" fill="white" opacity="0.42"/>

    <!-- Mouth -->
    <path d="M222 278 Q256 306 290 278" stroke="#818cf8" stroke-width="7" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Vertical separator -->
  <line x1="370" y1="178" x2="370" y2="452" stroke="rgba(255,255,255,0.055)" stroke-width="1"/>

  <!-- ── Text content ── -->

  <!-- Product name -->
  <text x="415" y="286"
        font-family="'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif"
        font-size="94" font-weight="800" letter-spacing="-3"
        fill="url(#title)">Phose</text>

  <!-- Tagline -->
  <text x="419" y="340"
        font-family="'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif"
        font-size="26" font-weight="400"
        fill="#94a3b8">Local reverse face search</text>

  <!-- Feature pill: Private -->
  <rect x="419" y="372" width="148" height="30" rx="15"
        fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="493" y="392" text-anchor="middle"
        font-family="'SF Pro Display', 'Inter', system-ui, sans-serif"
        font-size="13" font-weight="600" fill="#818cf8">100% Private</text>

  <!-- Feature pill: Browser -->
  <rect x="581" y="372" width="162" height="30" rx="15"
        fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.25)" stroke-width="1"/>
  <text x="662" y="392" text-anchor="middle"
        font-family="'SF Pro Display', 'Inter', system-ui, sans-serif"
        font-size="13" font-weight="600" fill="#10b981">Runs in Browser</text>

  <!-- Feature pill: No Uploads -->
  <rect x="757" y="372" width="136" height="30" rx="15"
        fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="825" y="392" text-anchor="middle"
        font-family="'SF Pro Display', 'Inter', system-ui, sans-serif"
        font-size="13" font-weight="600" fill="#818cf8">No Uploads</text>

  <!-- URL -->
  <text x="419" y="474"
        font-family="'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif"
        font-size="16" fill="#3d4d63">codiebe.com</text>
</svg>
